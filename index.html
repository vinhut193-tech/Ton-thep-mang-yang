<!DOCTYPE html>
<html>
<head>
    <title>Quản Lý Cửa Hàng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; }
        .hidden { display: none; }
        .menu-btn { padding: 15px; margin: 10px; width: 150px; cursor: pointer; }
        #login-form { max-width: 300px; margin: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Đăng Nhập Hệ Thống</h2>
        <input type="text" id="user" placeholder="Tên đăng nhập"><br><br>
        <input type="password" id="pass" placeholder="Mật khẩu"><br><br>
        <button onclick="login()">Vào hệ thống</button>
    </div>

    <div id="main-menu" class="hidden">
        <h2>Chào mừng, <span id="display-user"></span></h2>
        <p>Quyền hạn: <b id="display-role"></b></p>
        <hr>
        <button class="menu-btn">Bán Hàng</button>
        <button class="menu-btn">Tồn Kho</button>
        <button class="menu-btn">Công Nợ</button>
        <button class="menu-btn">Thu Chi</button>
        <br><br>
        <button onclick="location.reload()">Đăng xuất</button>
    </div>

    <script>
        const SCRIPT_URL = "AKfycbw2niInya7Wz9kmDLDdL4Ip6eLkw33Rwdafv6c-fQoiTO2XV6X2ShxnakVPHz31XkMJzA";

        function login() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({username: user, password: pass})
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-menu').classList.remove('hidden');
                    document.getElementById('display-user').innerText = user;
                    document.getElementById('display-role').innerText = data.role;
                } else {
                    alert(data.message);
                }
            });
        }
    </script>
</body>
</html>
