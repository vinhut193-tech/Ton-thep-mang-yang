<script>
function openModule(name) {
    // Tạo chuỗi mã hóa quyền để truyền sang trang sau
    const perms = btoa(JSON.stringify(userAuth.permissions)); 
    const userName = encodeURIComponent(userAuth.name);
    
    // Chuyển hướng sang file tương ứng (ví dụ: TonKho.html?user=PhanNhut&auth=...)
    window.location.href = `${name}.html?user=${userName}&auth=${perms}`;
}
</script>
