<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Trị Mang Yang Steel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary-bg: #f8fafd; --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); }
        body { font-family: 'Inter', sans-serif; background-color: var(--primary-bg); color: #2d3436; margin: 0; }
        
        #login-page { background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; position: fixed; width: 100%; top: 0; left: 0; z-index: 1000; }
        .login-card { background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }

        .sidebar { background: white; min-height: 100vh; border-right: 1px solid #edf2f7; width: 80px; position: fixed; display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100; }
        .main-content { margin-left: 80px; padding: 2rem; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; background: white; padding: 1rem 2rem; border-radius: 1rem; box-shadow: var(--card-shadow); }
        
        /* Giao diện chia nhóm Module */
        .category-title { font-size: 0.9rem; font-weight: 700; color: #0d6efd; text-transform: uppercase; border-left: 4px solid #0d6efd; padding-left: 10px; margin: 2rem 0 1rem 0; }
        .category-title.kinh-doanh { color: #198754; border-color: #198754; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        
        .module-card { background: white; border: none; border-radius: 1.25rem; padding: 1.5rem; transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; box-shadow: var(--card-shadow); border: 1px solid transparent; }
        .module-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); border: 1px solid #0d6efd; }
        
        .icon-box { width: 56px; height: 56px; border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin-right: 1.25rem; flex-shrink: 0; }
        .module-info h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; color: #1e293b; }
        .module-info p { font-size: 0.85rem; color: #64748b; margin: 0; }

        .bg-blue { background: #e7f0ff; color: #0d6efd; }
        .bg-green { background: #e6fffa; color: #059669; }
        .bg-orange { background: #fffaf0; color: #d97706; }
        .bg-purple { background: #f5f3ff; color: #7c3aed; }
        .bg-red { background: #fff5f5; color: #dc3545; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-card">
        <h3 class="fw-bold mb-4">MANG YANG STEEL</h3>
        <p class="text-muted mb-4">Vui lòng đăng nhập để tiếp tục</p>
        <input type="text" id="user" class="form-control form-control-lg mb-3" placeholder="Tên đăng nhập">
        <input type="password" id="pass" class="form-control form-control-lg mb-3" placeholder="Mật khẩu">
        <button class="btn btn-primary btn-lg w-100 fw-bold" onclick="doLogin()" id="login-btn">Vào hệ thống</button>
    </div>
</div>

<div id="app-page" class="hidden">
    <div class="sidebar d-none d-md-flex">
        <div class="mb-5"><i data-lucide="layers" class="text-primary" style="width: 32px; height: 32px;"></i></div>
        <div class="mb-4" style="cursor:pointer" onclick="location.reload()"><i data-lucide="home"></i></div>
        <div class="mt-auto mb-4"><i data-lucide="log-out" class="text-danger" style="cursor:pointer" onclick="logout()"></i></div>
    </div>

    <div class="main-content">
        <div class="header-top">
            <div>
                <h4 class="fw-bold mb-0 text-primary">DASHBOARD</h4>
                <p class="text-muted small mb-0" id="current-date"></p>
            </div>
            <div class="d-flex align-items-center">
                <div class="text-end me-3">
                    <div class="fw-bold" id="user-name"></div>
                    <div class="text-success small">Trực tuyến</div>
                </div>
                <img src="https://ui-avatars.com/api/?background=0D6EFD&color=fff&name=Admin" class="rounded-circle" width="45">
            </div>
        </div>

        <h2 class="fw-bold mb-4">Chào buổi chiều, <span id="welcome-name"></span> 👋</h2>
        
        <div id="group-kho-van" class="hidden">
            <div class="category-title">Kho Vận</div>
            <div class="grid-container" id="grid-kho-van"></div>
        </div>

        <div id="group-kinh-doanh" class="hidden">
            <div class="category-title kinh-doanh">Kinh Doanh</div>
            <div class="grid-container" id="grid-kinh-doanh"></div>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2niInya7Wz9kmDLDdL4Ip6eLkw33Rwdafv6c-fQoiTO2XV6X2ShxnakVPHz31XkMJzA/exec";
let userAuth = null;

// Cấu hình Module và nhóm
const moduleConfigs = {
    "TonKho": { group: "kho", icon: "package", color: "bg-blue", desc: "Dữ liệu tồn kho & vị trí." },
    "PhieuKho": { group: "kho", icon: "clipboard-list", color: "bg-blue", desc: "Nhập xuất & điều chuyển." },
    "BanHang": { group: "kinhdoanh", icon: "shopping-cart", color: "bg-green", desc: "Đơn hàng & Giao hàng." },
    "CongNo": { group: "kinhdoanh", icon: "credit-card", color: "bg-orange", desc: "Theo dõi công nợ khách hàng." },
    "ThuChi": { group: "kinhdoanh", icon: "wallet", color: "bg-purple", desc: "Dòng tiền & Chi phí." },
    "User": { group: "hethong", icon: "users", color: "bg-red", desc: "Nhân sự & Phân quyền." }
};

function checkAuth() {
    const savedUser = localStorage.getItem('loggedUser');
    if (savedUser) {
        userAuth = JSON.parse(savedUser);
        showAppPage();
    }
}
checkAuth();

async function doLogin() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    const btn = document.getElementById('login-btn');
    if(!u || !p) return alert("Vui lòng nhập đủ thông tin!");
    btn.innerText = "Đang kết nối...";
    btn.disabled = true;
    try {
        const res = await fetch(`${SCRIPT_URL}?action=login&u=${u}&p=${p}`);
        const data = await res.json();
        if(data.status === "success") {
            userAuth = data;
            localStorage.setItem('loggedUser', JSON.stringify(data)); 
            showAppPage();
        } else {
            alert(data.message);
            btn.innerText = "Vào hệ thống"; btn.disabled = false;
        }
    } catch(e) {
        alert("Lỗi kết nối!"); btn.disabled = false; btn.innerText = "Vào hệ thống";
    }
}

function showAppPage() {
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('app-page').classList.remove('hidden');
    document.getElementById('user-name').innerText = userAuth.name;
    document.getElementById('welcome-name').innerText = userAuth.name;
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    renderDashboard();
}

function logout() {
    if(confirm("Bạn muốn đăng xuất?")) { localStorage.removeItem('loggedUser'); location.reload(); }
}

function renderDashboard() {
    const gridKho = document.getElementById('grid-kho-van');
    const gridKinhDoanh = document.getElementById('grid-kinh-doanh');
    gridKho.innerHTML = ""; gridKinhDoanh.innerHTML = "";

    const modules = userAuth.permissions.read;
    let hasKho = false; let hasKinhDoanh = false;

    modules.forEach(mod => {
        if(!mod || mod.trim() === "") return;
        const conf = moduleConfigs[mod] || { group: "khac", icon: "box", color: "bg-blue", desc: "Chức năng hệ thống." };
        
        const card = document.createElement('div');
        card.className = "module-card";
        card.innerHTML = `
            <div class="icon-box ${conf.color}"><i data-lucide="${conf.icon}"></i></div>
            <div class="module-info">
                <h3>${mod}</h3>
                <p>${conf.desc}</p>
            </div>
        `;
        
        card.onclick = () => {
            const perms = btoa(JSON.stringify(userAuth.permissions));
            window.location.href = `${mod}.html?user=${encodeURIComponent(userAuth.name)}&auth=${perms}`;
        };

        if(conf.group === "kho") {
            gridKho.appendChild(card);
            hasKho = true;
        } else {
            gridKinhDoanh.appendChild(card);
            hasKinhDoanh = true;
        }
    });

    if(hasKho) document.getElementById('group-kho-van').classList.remove('hidden');
    if(hasKinhDoanh) document.getElementById('group-group-kinh-doanh').classList.remove('hidden'); // Fix ID call
    document.getElementById('group-kinh-doanh').classList.toggle('hidden', !hasKinhDoanh);

    lucide.createIcons();
}
</script>
</body>
</html>
