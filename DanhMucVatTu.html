<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh mục hàng hóa - Mang Yang Steel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg-body: #f4f7fa; --primary-color: #0d6efd; }
        body { background-color: var(--bg-body); font-family: 'Inter', sans-serif; font-size: 14px; }
        .page-header { background: white; padding: 1rem 2rem; border-bottom: 1px solid #e2e8f0; margin-bottom: 1.5rem; }
        .main-card { background: white; border-radius: 12px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin: 0 2rem; min-height: 400px; }
        .table thead { background: #f8fafc; border-bottom: 2px solid #edf2f7; }
        .table th { font-weight: 600; color: #475569; text-transform: uppercase; font-size: 12px; padding: 15px; }
        .table td { vertical-align: middle; padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }
        .icon-box { width: 32px; height: 32px; border-radius: 8px; background: #e7f0ff; color: #0d6efd; display: flex; align-items: center; justify-content: center; }
        .badge-active { background: #e6fffa; color: #059669; border: 1px solid #b2f5ea; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
        .badge-inactive { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
        .modal-content { border-radius: 16px; border: none; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #cbd5e1; padding: 10px; }
    </style>
</head>
<body>

<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1">
                <li class="breadcrumb-item"><a href="#" class="text-decoration-none text-muted">Trang chủ</a></li>
                <li class="breadcrumb-item"><a href="#" class="text-decoration-none text-muted">Kho vận</a></li>
                <li class="breadcrumb-item active fw-bold text-primary">Danh mục hàng hóa</li>
            </ol>
        </nav>
        <button class="btn btn-sm btn-outline-secondary" onclick="history.back()">
            <i data-lucide="arrow-left" style="width:16px"></i> Quay lại
        </button>
    </div>
    <button class="btn btn-primary d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#modalAdd">
        <i data-lucide="plus-circle" style="width:20px"></i> Thêm mới
    </button>
</div>

<div class="main-card">
    <div class="p-3 border-bottom d-flex gap-3">
        <div class="input-group" style="max-width: 300px;">
            <span class="input-group-text bg-white border-end-0"><i data-lucide="search" style="width:16px" class="text-muted"></i></span>
            <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Tìm theo tên hoặc mã..." onkeyup="filterTable()">
        </div>
    </div>

    <table class="table mb-0">
        <thead>
            <tr>
                <th width="5%"><input type="checkbox" class="form-check-input"></th>
                <th width="5%">Thứ tự</th>
                <th width="25%">Tên hàng</th>
                <th width="15%">Mã hàng</th>
                <th width="20%">Nhóm hàng</th>
                <th width="10%">Trạng thái</th>
                <th width="10%">Cập nhật</th>
                <th width="10%" class="text-end">Thao tác</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="8" class="text-center py-5 text-muted">Đang tải dữ liệu...</td></tr>
        </tbody>
    </table>
</div>

<div class="modal fade" id="modalAdd" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="icon-box"><i data-lucide="list"></i></div>
                    <h5 class="modal-title fw-bold">Thông tin mặt hàng</h5>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="productForm" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Mã hàng <span class="text-danger">*</span></label>
                        <input type="text" id="sku" class="form-control" placeholder="VD: Sắt-001" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tên hàng <span class="text-danger">*</span></label>
                        <input type="text" id="name" class="form-control" placeholder="VD: Thép tấm 5 ly" required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Nhóm hàng</label>
                        <select id="category" class="form-select"></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Thứ tự</label>
                        <input type="number" id="sort_order" class="form-control" value="0">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Đơn vị tính</label>
                        <select id="unit" class="form-select">
                            <option value="">— Đang tải đơn vị —</option>
                        </select>
                    </div>
                    <div class="col-md-12 mt-4">
                        <div class="d-flex align-items-center justify-content-between p-3 border rounded-3 bg-light">
                            <div>
                                <div class="fw-bold">Trạng thái</div>
                                <small class="text-muted">Đang hoạt động</small>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="statusSwitch" checked>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-primary px-4" id="btnSave" onclick="saveData()">Lưu mặt hàng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SB_URL = "https://rlttyoforullfzlyeawa.supabase.co";
    const SB_KEY = "sb_publishable_Poa0upMxgh2GM0JkS17Bkg_XhchIrrb"; 

    window.onload = async function() {
        lucide.createIcons();
        await loadCategories(); // Load nhóm hàng
        await loadUnits();      // Load ĐƠN VỊ TÍNH TỪ SUPABASE
        await loadProducts();   // Load danh sách sản phẩm
    };

    // 1. Lấy danh sách Nhóm hàng
    async function loadCategories() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/categories?select=*&order=name.asc`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            const data = await res.json();
            const select = document.getElementById('category');
            select.innerHTML = '<option value="">— Chọn nhóm hàng —</option>' + 
                               data.map(cat => `<option value="${cat.name}">${cat.name}</option>`).join('');
        } catch (e) { console.error("Lỗi load nhóm:", e); }
    }

    // 2. Lấy danh sách ĐƠN VỊ TÍNH (Kết nối với Quanlynhom.html)
    async function loadUnits() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/units?select=*&order=name.asc`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            const data = await res.json();
            const select = document.getElementById('unit');
            
            if (data.length === 0) {
                select.innerHTML = '<option value="">(Chưa có ĐVT)</option>';
            } else {
                select.innerHTML = '<option value="">— Chọn đơn vị —</option>' + 
                                   data.map(u => `<option value="${u.name}">${u.name}</option>`).join('');
            }
        } catch (e) {
            console.error("Lỗi load đơn vị:", e);
            document.getElementById('unit').innerHTML = '<option value="">Lỗi tải dữ liệu</option>';
        }
    }

    // 3. Lấy danh sách Sản phẩm
    async function loadProducts() {
        try {
            const response = await fetch(`${SB_URL}/rest/v1/products?select=*&order=created_at.desc`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            const data = await response.json();
            renderTable(data);
        } catch (error) {
            console.error("Lỗi load sản phẩm:", error);
            document.getElementById('table-body').innerHTML = `<tr><td colspan="8" class="text-center text-danger">Lỗi kết nối database.</td></tr>`;
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4">Chưa có mặt hàng nào.</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map(item => `
            <tr>
                <td><input type="checkbox" class="form-check-input"></td>
                <td class="text-center">${item.sort_order || 0}</td>
                <td>
                    <div class="d-flex align-items-center gap-3">
                        <div class="icon-box"><i data-lucide="package"></i></div>
                        <span class="fw-bold">${item.name}</span>
                    </div>
                </td>
                <td><span class="badge bg-light text-dark border">${item.sku}</span></td>
                <td class="text-muted">${item.category_name || '—'}</td>
                <td><span class="${item.is_active !== false ? 'badge-active' : 'badge-inactive'}">${item.is_active !== false ? 'Hoạt động' : 'Tạm dừng'}</span></td>
                <td class="text-muted small">${new Date(item.created_at).toLocaleDateString('vi-VN')}</td>
                <td class="text-end">
                    <button class="btn btn-link p-0 me-2 text-primary" onclick="alert('Tính năng đang cập nhật')"><i data-lucide="edit-3" style="width:18px"></i></button>
                    <button class="btn btn-link p-0 text-danger" onclick="deleteItem('${item.id}')"><i data-lucide="trash-2" style="width:18px"></i></button>
                </td>
            </tr>
        `).join('');
        lucide.createIcons();
    }

    async function saveData() {
        const btn = document.getElementById('btnSave');
        const product = {
            sku: document.getElementById('sku').value.trim(),
            name: document.getElementById('name').value.trim(),
            category_name: document.getElementById('category').value,
            sort_order: parseInt(document.getElementById('sort_order').value) || 0,
            unit: document.getElementById('unit').value, // LẤY GIÁ TRỊ TỪ SELECT
            is_active: document.getElementById('statusSwitch').checked
        };

        if (!product.sku || !product.name) return alert("Vui lòng nhập Mã và Tên hàng!");

        btn.disabled = true;
        btn.innerText = "Đang lưu...";

        try {
            const response = await fetch(`${SB_URL}/rest/v1/products`, {
                method: "POST",
                headers: { 
                    "apikey": SB_KEY, 
                    "Authorization": `Bearer ${SB_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify(product)
            });

            if (response.ok) {
                alert("Lưu thành công!");
                location.reload();
            } else {
                const err = await response.json();
                alert("Lỗi: " + err.message);
            }
        } catch (error) {
            alert("Lỗi kết nối!");
        } finally {
            btn.disabled = false;
            btn.innerText = "Lưu mặt hàng";
        }
    }

    async function deleteItem(id) {
        if(!confirm("Xóa mặt hàng này?")) return;
        try {
            await fetch(`${SB_URL}/rest/v1/products?id=eq.${id}`, {
                method: "DELETE",
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            location.reload();
        } catch (e) { alert("Lỗi xóa!"); }
    }

    function filterTable() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.querySelectorAll('#table-body tr');
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    }
</script>
</body>
</html>
